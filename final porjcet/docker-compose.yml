services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: five_star_a
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d five_star_a" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./five_star_a
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/five_star_a
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      DEBUG: "false"
      FRONTEND_URL: http://localhost:80
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./five_star_a/frontend_new
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./five_star_a/infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/tms-dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./five_star_a/infra/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./five_star_a/infra/grafana/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./five_star_a/infra/grafana/tms-dashboard.json:/var/lib/grafana/dashboards/tms-dashboard.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  search:
    build:
      context: ./5A_Search
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
