version: '3.9'

services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sms_db
      POSTGRES_USER: sms_user
      POSTGRES_PASSWORD: sms_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sms_user -d sms_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sms_network

  # ─── Redis Cache ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sms_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sms_network

  # ─── Backend API (FastAPI) ────────────────────────────────────────────────────
  backend:
    build:
      context: ../fastapi_backend
      dockerfile: Dockerfile
    container_name: sms_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://sms_user:sms_password@postgres:5432/sms_db
      REDIS_URL: redis://redis:6379/0
      ENABLE_METRICS: "true"
      FRONTEND_URL: http://localhost:5173
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8000/docs || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sms_network

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../5A_Search
      dockerfile: Dockerfile
      target: production
    container_name: sms_frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sms_network

  # ─── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: sms_prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - sms_network

  # ─── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: sms_grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sms_grafana_2026
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/sms-dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/sms-dashboard.json:ro
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./grafana/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
    depends_on:
      - prometheus
    networks:
      - sms_network

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  sms_network:
    driver: bridge
